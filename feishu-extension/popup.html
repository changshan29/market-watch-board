<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>飞书消息采集</title>
<style>
  body { font-family: -apple-system, sans-serif; width: 300px; padding: 16px; margin: 0; }
  h2 { font-size: 15px; margin: 0 0 12px; }
  label { display: block; font-size: 12px; color: #555; margin-bottom: 3px; }
  input { width: 100%; box-sizing: border-box; padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; margin-bottom: 10px; }
  .btns { display: flex; gap: 8px; margin-top: 4px; }
  button { flex: 1; padding: 7px; border: none; border-radius: 4px; font-size: 13px; cursor: pointer; }
  #saveBtn { background: #1677ff; color: #fff; }
  #clearBtn { background: #f5f5f5; color: #333; }
  .status { font-size: 12px; color: #888; margin-top: 12px; border-top: 1px solid #eee; padding-top: 10px; }
  .status span { color: #333; font-weight: 500; }
  .ok { color: #52c41a !important; }
  .err { color: #ff4d4f !important; }
</style>
</head>
<body>
<h2>飞书消息采集</h2>

<label>服务器地址</label>
<input id="serverUrl" type="text" placeholder="http://localhost:3220">

<label>群名称（显示为来源）</label>
<input id="groupName" type="text" placeholder="飞书群">

<div class="btns">
  <button id="saveBtn">保存</button>
  <button id="clearBtn">清除已发记录</button>
</div>

<div class="status" id="status">
  最后采集：<span id="lastSent">-</span><br>
  已发送条数：<span id="totalSent">-</span>
</div>

<script src="popup.js"></script>
</body>
</html>
